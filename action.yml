name: Run Commitlint
author: "abi group GmbH"
description: |
  Runs commitlint based on the '@abinnovision/commitlint-config' config.
inputs:
  token:
    description: "'GITHUB_TOKEN' or a repo scoped Personal Access Token (PAT)."
    default: ${{ github.token }}
  enable-pr-title-lint:
    description: |
      If set to 'true', the pull request title will also be linted using the same
      commitlint rules as commit messages. Only applies to 'pull_request' and
      'pull_request_target' events; ignored otherwise.
    default: "true"
runs:
  using: node24
  main: dist/index.js
